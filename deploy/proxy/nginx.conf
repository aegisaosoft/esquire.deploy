worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # ── Frontend (Angular) ── HTTPS :443 ──
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/self-signed.crt;
        ssl_certificate_key /etc/nginx/certs/self-signed.key;

        location / {
            proxy_pass http://esq-frontend:4200;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # ── Gateway API ── HTTPS :3443 ──
    server {
        listen 3443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/self-signed.crt;
        ssl_certificate_key /etc/nginx/certs/self-signed.key;

        location / {
            # ── CORS: handle preflight (OPTIONS) entirely at Nginx ──
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'      $http_origin always;
                add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, X-Request-ID, X-Correlation-ID, X-Capture-Metrics' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age'           3600;
                add_header 'Content-Type'                     'text/plain; charset=utf-8';
                add_header 'Content-Length'                    0;
                return 204;
            }

            # ── CORS: add response headers for actual requests ──
            add_header 'Access-Control-Allow-Origin'      $http_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers'    'X-Request-ID, X-Correlation-ID, X-Response-Time, Esq-Service-Time, Esq-Backend-Time' always;

            # ── Strip Origin so Spring never sees a CORS request ──
            proxy_set_header Origin        "";
            proxy_set_header Host          $host;
            proxy_set_header X-Real-IP     $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_pass http://esq-gateway:7070;
        }
    }

    # ── Keycloak ── HTTPS :8443 ──
    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/self-signed.crt;
        ssl_certificate_key /etc/nginx/certs/self-signed.key;

        location / {
            proxy_pass http://esq-keycloak:8080;
            proxy_set_header Host              $host:$server_port;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;

            # Keycloak может отдавать большие заголовки
            proxy_buffer_size       128k;
            proxy_buffers           4 256k;
            proxy_busy_buffers_size 256k;
        }
    }
}
