# =============================================================================
# Nginx HTTPS Reverse Proxy for Kubernetes
# Terminates TLS with self-signed certificate, proxies to internal services.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: proxy-nginx-config
  namespace: esquire
data:
  nginx.conf: |
    worker_processes 1;

    events {
        worker_connections 1024;
    }

    http {
        # ── Frontend (Angular) ── HTTPS :443 ──
        server {
            listen 443 ssl;
            server_name _;

            ssl_certificate     /etc/nginx/certs/self-signed.crt;
            ssl_certificate_key /etc/nginx/certs/self-signed.key;

            location / {
                proxy_pass http://frontend:4200;
                proxy_http_version 1.1;
                proxy_set_header Upgrade    $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host       $host;
                proxy_set_header X-Real-IP  $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
            }
        }

        # ── Gateway API ── HTTPS :3443 ──
        server {
            listen 3443 ssl;
            server_name _;

            ssl_certificate     /etc/nginx/certs/self-signed.crt;
            ssl_certificate_key /etc/nginx/certs/self-signed.key;

            location / {
                # ── CORS: handle preflight (OPTIONS) entirely at Nginx ──
                if ($request_method = 'OPTIONS') {
                    add_header 'Access-Control-Allow-Origin'      $http_origin always;
                    add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS' always;
                    add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, X-Request-ID, X-Correlation-ID, X-Capture-Metrics' always;
                    add_header 'Access-Control-Allow-Credentials' 'true' always;
                    add_header 'Access-Control-Max-Age'           3600;
                    add_header 'Content-Type'                     'text/plain; charset=utf-8';
                    add_header 'Content-Length'                    0;
                    return 204;
                }

                # ── CORS: add response headers for actual requests ──
                add_header 'Access-Control-Allow-Origin'      $http_origin always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Expose-Headers'    'X-Request-ID, X-Correlation-ID, X-Response-Time, Esq-Service-Time, Esq-Backend-Time' always;

                # ── Strip Origin so Spring never sees a CORS request ──
                proxy_set_header Origin        "";
                proxy_set_header Host          $http_host;
                proxy_set_header X-Real-IP     $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;

                proxy_pass http://gateway:7070;
            }
        }

        # ── Keycloak ── HTTPS :8443 ──
        server {
            listen 8443 ssl;
            server_name _;

            ssl_certificate     /etc/nginx/certs/self-signed.crt;
            ssl_certificate_key /etc/nginx/certs/self-signed.key;

            location / {
                proxy_pass http://keycloak:8080;
                proxy_set_header Host              $http_host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
                proxy_set_header X-Forwarded-Host  $http_host;

                proxy_buffer_size       128k;
                proxy_buffers           4 256k;
                proxy_busy_buffers_size 256k;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy
  namespace: esquire
  labels:
    app: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proxy
  template:
    metadata:
      labels:
        app: proxy
    spec:
      containers:
        - name: proxy
          image: esquire/proxy:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 443
            - containerPort: 3443
            - containerPort: 8443
          env:
            - name: DEPLOY_HOST
              valueFrom:
                configMapKeyRef:
                  name: esq-config
                  key: DEPLOY_HOST
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: nginx-config
          configMap:
            name: proxy-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: proxy
  namespace: esquire
spec:
  type: NodePort
  selector:
    app: proxy
  ports:
    - name: https-frontend
      port: 443
      targetPort: 443
      nodePort: 30443
    - name: https-gateway
      port: 3443
      targetPort: 3443
      nodePort: 30343
    - name: https-keycloak
      port: 8443
      targetPort: 8443
      nodePort: 30843
