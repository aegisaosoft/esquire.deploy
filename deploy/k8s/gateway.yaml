apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: esquire
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: esquire/gateway:latest
          imagePullPolicy: Never
          command: ["java", "-jar", "app.jar"]
          ports:
            - containerPort: 7070
          env:
            - name: GATEWAY_PORT
              value: "7070"
            - name: BIZTREE_HOST
              value: "biztree"
            - name: BIZTREE_PORT
              value: "3002"
            - name: ENYMAN_HOST
              value: "enyman"
            - name: ENYMAN_PORT
              value: "3003"
            - name: PACMAN_HOST
              value: "pacman"
            - name: PACMAN_PORT
              value: "3004"
            - name: KEYSMITH_HOST
              value: "keysmith"
            - name: KEYSMITH_PORT
              value: "3005"
            - name: KEYCLOAK_HOST
              value: "keycloak"
            - name: KEYCLOAK_PORT
              value: "8080"
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: esq-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: esq-config
                  key: KEYCLOAK_CLIENT_ID
            - name: CORS_ALLOWED_ORIGINS
              value: "http://192.168.1.104:30200"
            - name: LOG_LEVEL_ROOT
              valueFrom:
                configMapKeyRef:
                  name: esq-config
                  key: LOG_LEVEL_ROOT
            - name: LOG_LEVEL_SF
              valueFrom:
                configMapKeyRef:
                  name: esq-config
                  key: LOG_LEVEL_SF
            - name: LOG_LEVEL_MIR0N
              valueFrom:
                configMapKeyRef:
                  name: esq-config
                  key: LOG_LEVEL_MIR0N
            - name: GW_SERVICE_METRICS_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 7070
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 7070
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: esquire
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 7070
      targetPort: 7070
      nodePort: 30000
